services:
  - type: web
    name: ai-product-knowledge-assistant-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: TOP_K_RESULTS
        value: "3"
      - key: CHUNK_SIZE
        value: "4"
      - key: CHUNK_OVERLAP
        value: "1"
      - key: CORS_ORIGINS
        value: https://ai-product-knowledge-assistant.vercel.app,http://localhost:3000
      # Render's free tier CPU is too weak to run the cross-encoder's
      # per-request forward passes without adding ~9-10s to every /ask
      # call (measured live). Local dev keeps RERANK_ENABLED defaulting to
      # true (see config.py) — this override only affects production.
      - key: RERANK_ENABLED
        value: "false"
